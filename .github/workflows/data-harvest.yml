name: TfL Data Harvest

on:
  schedule:
    - cron: '*/15 * * * *' # Every 15 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  harvest-and-track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dvc dvc-gdrive requests pandas networkx

      - name: Run data harvesting
        run: |
          python src/data_harvest.py
        env:
          TFL_API_KEY: ${{ secrets.TFL_API_KEY }}

      - name: DVC Add and Push
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
        run: |
          # Configure DVC to use service account auth
          dvc remote modify storage gdrive_use_service_account true
          dvc remote modify storage --local gdrive_service_account_credentials_data "$GDRIVE_CREDENTIALS_DATA"
          
          dvc add data/raw/tfl_density_latest.json
          dvc push data/raw/tfl_density_latest.json.dvc
          
      - name: Commit DVC metadata
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/tfl_density_latest.json.dvc
          git commit -m "chore: Update TfL density data via GHA [skip ci]" || echo "No changes to commit"
          git push
